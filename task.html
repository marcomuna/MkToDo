<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete Task's Page</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="icon" href="icons/icon.ico" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px;
        margin-bottom: 20px;
        position: sticky;
        top: 60px;
        background-color: #060e20;
        z-index: 20;
      }
      #filter {
        background-color: #060e20;
        border: none;
        color: white;
      }
      h1 {
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <img src="/icons/logo.png" alt="logo" width="100px" />

      <div class="navbar-right">
        <div class="avatar" id="profileBtn">M</div>
      </div>
    </nav>
    <aside class="sidebar">
      <div>
        <h2 class="sidebar-title">Collections</h2>
        <p class="sidebar-subtitle">Productivity Flow</p>
      </div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="index.html"
          ><i class="fa-solid fa-house"></i>Home</a
        >
        <a class="sidebar-link active" href="task.html"
          ><i class="fa-solid fa-list-ul"></i>All Tasks</a
        >
        <a class="sidebar-link" href="#"
          ><i class="fa-regular fa-circle-exclamation"></i>Important</a
        >
        <a class="sidebar-link" href="#"
          ><i class="fa-regular fa-calendar-days"></i>Calender</a
        >
      </nav>
      <div class="sidebar-footer">
        <button class="new-list-btn" id="createBtn">
          <span style="font-size: 20px; font-weight: bold">+</span>
          <span>New List</span>
        </button>
      </div>
    </aside>
    <main>
      <div class="head">
        <div class="head-container">
          <h1>All Tasks</h1>

          <p class="page-subtitle">
            You have Total <span class="taskNo">0</span> tasks.
          </p>
        </div>

        <select name="filter" id="filter">
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
          <option value="expired">Expired</option>
          <option value="all">All</option>
        </select>
      </div>
      <div class="tasks-list">
        <div class="task-card">
          <div class="task-left">
            <div>
              <h4 class="task-name">Default Card</h4>
              <span class="task-time">Schedule 08/07/2004 - 00:00 am</span>
              <p class="task-decription">
                This is default card which is created by the html code not by js
                logic.
              </p>
            </div>
          </div>
          <button class="task-menu">&#8942;</button>
          <div class="menubtn hidden-menu">
            <button class="edit-action">
              <i class="fa-solid fa-pen"></i>Edit
            </button>
            <button class="done-action">
              <i class="fa-regular fa-circle-check"></i>Complete
            </button>
            <button class="delete-action">
              <i class="fa-regular fa-trash"></i>Delete
            </button>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <nav class="bottom-nav" style="z-index: 1000">
        <a class="navList" href="index.html"
          ><i class="fa-solid fa-house"></i>Home</a
        >
        <button class="fab">+</button>
        <a class="navList" href="/task.html"
          ><i class="fa-solid fa-list-ul"></i>All Task</a
        >
      </nav>
    </footer>
    <div class="overlay hidden">
      <div class="modal">
        <h2>Create List</h2>
        <div class="form-group">
          <label>Enter New Task</label>
          <input
            class="task"
            type="text"
            placeholder="Enter the Task to add"
            required
          />
        </div>
        <div class="form-group">
          <label>Enter Description</label>
          <textarea
            class="taskDesc"
            placeholder="Enter Description about the Task"
            required
          ></textarea>
        </div>
        <div class="form-group">
          <label>Date & Time</label>
          <input class="dateTime" type="datetime-local" required />
        </div>
        <div class="actions">
          <button class="btn cancel">Cancel</button>
          <button class="btn submit">Submit</button>
        </div>
      </div>
    </div>
    <div class="overlay profile-overlay hidden">
      <div class="modal">
        <h2>Profile</h2>

        <div class="form-group">
          <label>Your Name</label>
          <input
            type="text"
            class="profile-name"
            placeholder="Enter your name"
          />
        </div>

        <div class="form-group">
          <label>Upload Profile Image</label>
          <input type="file" class="profile-img" accept="image/*" />
        </div>

        <div class="actions">
          <button class="btn cancel-profile">Cancel</button>
          <button class="btn save-profile">Save</button>
        </div>
      </div>
    </div>
    <nav class="bottom-nav"></nav>

    <script src="script.js"></script>
  </body>
</html>
